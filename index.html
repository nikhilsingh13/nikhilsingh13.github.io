<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikhil Singh</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
            transition: background-color 0.3s, color 0.3s;
            padding-top: 60px;
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #333;
            color: #fff;
            padding: 10px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .navbar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }
        .navbar li {
            padding: 0 10px;
        }
        .navbar a {
            color: #0d6efd;
            text-decoration: none;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .theme-toggle {
            cursor: pointer;
            border: none;
            background: none;
        }
        .theme-toggle img {
            width: 24px;
            height: 24px;
        }
        .light-mode {
            background-color: #f4f4f4;
            color: #333;
        }
        .content {
            padding: 20px 10%; /* Consistent padding around content */
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="articles.html">Articles</a></li>
            <li><a href="competitions.html">Competitions</a></li>
            <li><a href="apps.html">Apps</a></li>
            <li><a href="contact.html">Contact Me</a></li>
        </ul>
		<button class="theme-toggle" onclick="toggleDarkMode()">
			<img src="images/sun_icon.png" alt="Sun" id="theme-icon">
		</button>
    </div>
    <div class="content">
        <header>
            <h1>Welcome to Nikhil Singh's Portfolio</h1>
            <p>Experienced in applied machine learning and AI, specializing in practical ML solutions and consulting.</p>
        </header>
    </div>
    <script>
        function toggleDarkMode() {
            var icon = document.getElementById('theme-icon');
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                icon.src = 'images/sun_icon.png';
                icon.alt = 'Moon';
            } else {
                icon.src = 'images/sun_icon.png';
                icon.alt = 'Sun';
            }
        }
    </script>
</body>
</html>
