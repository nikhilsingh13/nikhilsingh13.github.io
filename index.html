<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikhil Singh</title>
    <link rel="icon" type="image/png" href="images/nikhil-favicon.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #121212;
            transition: background-color 0.3s, color 0.3s;
            padding-top: 60px;
        }

        .dark-mode {
            background-color: #333;
            color: #f4f4f4;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #333;
            color: #fff;
            padding: 10px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .navbar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        .navbar li {
            padding: 0 10px;
        }

        .navbar a,
        .social-icon a {
            color: #0d6efd;
            text-decoration: none;
        }

        .navbar a:hover,
        .social-icon a:hover {
            text-decoration: underline;
        }

        .theme-toggle,
        .social-icon {
            cursor: pointer;
            border: none;
            background: none;
        }

        .theme-toggle img,
        .social-icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .social-icon {
            margin-left: auto;
            display: flex;
        }

        .social-icon a {
            margin-right: 10px;
        }

        .social-icon a:last-child {
            margin-right: 0;
        }

        .content {
            padding: 20px 10%;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="articles.html">Articles</a></li>
            <li><a href="competitions.html">Competitions</a></li>
            <li><a href="apps.html">Apps</a></li>
            <li><a href="contact.html">Contact Me</a></li>
        </ul>
        <div class="social-icon">
            <a href="https://www.linkedin.com/in/singh-nikhil/" target="_blank" styles="margin-left: 20px;">
                <img src="images/LI-In-Bug.png" alt="LinkedIn" width="24"></a>
            <a href="https://github.com/nikhilsingh13" target="_blank" styles="margin-left: 20px;">
                <img src="images/github-mark-white.png" alt="GitHub" width="24"></a>
        </div>
        <button class="theme-toggle" onclick="toggleDarkMode()">
            <img src="images/sun_icon.png" alt="Sun" id="theme-icon">
        </button>
    </div>
    <div class="content">
        <header>
            <h1>Nikhil Singh</h1>
            <p>Experienced in applied machine learning and AI, specializing in practical ML solutions and consulting. I
                have developed business-driven ML strategies and have a decent understanding of product management.</p>
        </header>
    </div>
    <script>
        function toggleDarkMode() {
            var icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('dark-mode')) {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
                icon.alt = 'Sun';
            } else {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                icon.alt = 'Sun';
            }
        }
    </script>
</body>

</html>
