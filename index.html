	<script>
		function toggleDarkMode() {
			var body = document.body;
			var toggleIcon = document.getElementById('toggleIcon');
			body.classList.toggle('dark-mode');
			if (body.classList.contains('dark-mode')) {
				toggleIcon.src = 'moon_icon.png'; // Update to path of your moon icon
				toggleIcon.alt = 'Moon';
			} else {
				toggleIcon.src = 'sun_icon.png'; // Update to path of your sun icon
				toggleIcon.alt = 'Sun';
			}
		}
	</script>
